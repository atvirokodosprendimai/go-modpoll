name: release

# Build downloadable binaries for all supported platforms.
#
# Triggered after the `docker` workflow completes successfully on a `vX.Y.Z`
# tag, so binaries are built only when the matching container image is also
# published. `workflow_dispatch` runs the build matrix on demand (manual
# downloads off the run page; no GitHub Release is created).
on:
  workflow_run:
    workflows: ['docker']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    # Run only when:
    #   - it's a manual dispatch, OR
    #   - the docker workflow finished successfully on a tag named v*.
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          startsWith(github.event.workflow_run.head_branch, 'v')
        )
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
          - { os: linux,   arch: arm,   goarm: '7' }
          - { os: darwin,  arch: amd64 }
          - { os: darwin,  arch: arm64 }
          - { os: windows, arch: amd64 }
    steps:
      - name: Resolve ref and version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            checkout_ref="${{ github.event.workflow_run.head_sha }}"
            version="${{ github.event.workflow_run.head_branch }}"
          else
            checkout_ref="${{ github.sha }}"
            version="dev-$(echo "${{ github.sha }}" | cut -c1-7)"
          fi
          echo "ref=${checkout_ref}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building ${version} from ${checkout_ref}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: new/go.mod
          cache-dependency-path: new/go.sum

      - name: Build binary
        working-directory: new
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          out_dir="${GITHUB_WORKSPACE}/dist/modpoll-${GOOS}-${GOARCH}"
          mkdir -p "$out_dir"
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${{ steps.ver.outputs.version }}" \
            -o "$out_dir/modpoll$ext" .
          cp README.md "$out_dir/" || true
          cp LICENSE "$out_dir/" || true

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          base="modpoll_${{ steps.ver.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}"
          src_dir="modpoll-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows" ]; then
            (cd dist && zip -qr "../artifacts/${base}.zip" "${src_dir}")
            echo "archive=${base}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "artifacts/${base}.tar.gz" -C dist "${src_dir}"
            echo "archive=${base}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.archive }}
          path: artifacts/${{ steps.pkg.outputs.archive }}
          retention-days: 30
          if-no-files-found: error

  release:
    name: publish GitHub Release
    needs: build
    # Only publish a Release for the workflow_run path (tag-driven). Manual
    # dispatch leaves the binaries as run artifacts only.
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          ls -1
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
